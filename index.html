<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subdomain Takeover Validation</title>

    <style>
        body {
            background: #0f172a;
            color: #e2e8f0;
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 80px;
        }

        .card {
            width: 700px;
            margin: auto;
            background: #111827;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 0 25px rgba(0,0,0,0.5);
        }

        h1 {
            color: #22c55e;
            font-size: 42px;
        }

        code {
            background: #1e293b;
            padding: 4px 8px;
            border-radius: 6px;
        }

        .warning {
            color: #facc15;
            margin-top: 20px;
        }

        button {
            margin-top: 30px;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            background: #2563eb;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>Subdomain Takeover Confirmed</h1>

    <p>
        This domain is serving attacker-controlled content via a dangling
        GitHub Pages configuration.
    </p>

    <p>
        Host: <code id="host"></code>
    </p>

    <p>
        Current Time: <code id="time"></code>
    </p>

    <button onclick="runPoC()">Run JS PoC</button>

    <p class="warning">
        Authorized Security Assessment Proof-of-Concept Only
    </p>
</div>

<script>
    document.getElementById("host").innerText = window.location.hostname;
    document.getElementById("time").innerText = new Date().toString();

    function runPoC() {
        alert("JavaScript Execution Successful on " + window.location.hostname);
        console.log("Subdomain takeover PoC executed successfully.");
    }
</script>

</body>
</html>
